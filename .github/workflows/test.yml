name: Run Tests

on:
  pull_request:
    branches: [development]
  push:
    branches: [development, feature/*]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Use Yarn 4
        run: corepack prepare yarn@4.13.0 --activate

      - name: Instalar dependencias
        run: yarn install

      - name: Ejecutar tests
        run: yarn test