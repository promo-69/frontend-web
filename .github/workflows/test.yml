name: Run Tests

on:
  pull_request:
    branches: [development]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: yarn install

      - name: Ejecutar tests
        run: yarn test